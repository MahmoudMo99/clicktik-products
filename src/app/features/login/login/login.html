<section class="login-page">
  <section class="login-card" aria-labelledby="login-title">
    <img class="login-logo" src="/clicktik-logo.svg" alt="" width="48" height="48" />

    <div class="login-card-header">
      <h1 id="login-title">Log in to your account</h1>
      <p>Welcome back! Please enter your details.</p>
    </div>

    <form class="login-form" (submit)="onSubmit($event)">
      @if (errorMessage()) {
        <p class="login-error" role="alert">
          {{ errorMessage() }}
        </p>
      }

      <app-input
        id="username"
        label="Email"
        placeholder="Enter your email"
        autocomplete="username"
        [value]="form().username"
        [error]="usernameError()"
        [disabled]="loading()"
        (valueChange)="updateUsername($event)"
      />

      <app-input
        id="password"
        label="Password"
        type="password"
        placeholder="Enter your password"
        autocomplete="current-password"
        [value]="form().password"
        [error]="passwordError()"
        [disabled]="loading()"
        (valueChange)="updatePassword($event)"
      />

      <app-button type="submit" size="lg" [fullWidth]="true" [loading]="loading()">
        Sign in
      </app-button>
    </form>
  </section>
</section>
